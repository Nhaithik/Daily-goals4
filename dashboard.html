<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "a5228543-f82a-49c9-97c4-0e3f4acf3247",
    });
  });
</script>
  
</head>
<body class="dashboard-body" onload="checkLogin()">

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Daily Goals</h2>
   <ul>
  <li onclick="goDashboard()">Dashboard</li>
  <li onclick="goTasks()">My tasks</li>
  <li onclick="goProfile()">Profile</li>
  <li onclick="goSettings()">Settings</li>
  <li onclick="logout()">Log out</li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <input placeholder="Search">
      <div class="top-right">
    <button class="new-task" onclick="openNewTask()">+ New task</button>
        <img src="profile.png" class="profile-pic" onclick="goProfile()">
      </div>
    </div>

    <div class="grid">
      <div class="card">📅 Calendar</div>
      <div class="card">📋 My tasks</div>
      <div class="card">🔥 My streaks</div>
      <div class="card">📊 Activity + progress</div>
    </div>
      <!-- NEW TASK POPUP -->
<!-- NEW TASK POPUP -->
<div id="taskModal" class="modal">
  <div class="modal-content">

    <!-- CLOSE BUTTON -->
    <span class="close-btn" onclick="closeNewTask()">×</span>

    <h2>New Task</h2>

    <input type="text" placeholder="Title">
    <textarea placeholder="Notes"></textarea>
    <input type="url" placeholder="URL">
    <input type="date">

    <select>
      <option>Stage</option>
      <option>Not Started</option>
      <option>In Progress</option>
      <option>Completed</option>
    </select>

    <select>
      <option>Priority</option>
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>

    <input type="text" placeholder="Team">
    <input type="text" placeholder="Assignee">

    <button class="save-btn">Save Task</button>
  </div>
</div>



  <body class="dashboard-body" onload="checkLogin()">

  <!-- ALL YOUR HTML CODE -->

  <script src="script.js"></script>
</body>

</html>
